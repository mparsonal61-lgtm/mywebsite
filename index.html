<!DOCTYPE html>
<html>
<head>

<title>Cyber Tools Hub</title>

<style>

body{
background:#000;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin:0;
}

h1{
padding:20px;
}

.tools{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.tool{
background:#111;
border:1px solid #00ff9c;
border-radius:10px;
padding:20px;
width:260px;
}

button{
padding:8px 14px;
margin-top:10px;
cursor:pointer;
}

input,textarea{
width:90%;
padding:8px;
margin-top:8px;
}

</style>

</head>

<body>

<h1>Cyber Tools Hub</h1>

<div class="tools">

<div class="tool">
<h3>Password Generator</h3>
<button onclick="pass()">Generate</button>
<p id="pass"></p>
</div>

<div class="tool">
<h3>Random Number</h3>
<button onclick="rand()">Generate</button>
<p id="rand"></p>
</div>

<div class="tool">
<h3>Word Counter</h3>
<textarea id="word"></textarea>
<button onclick="words()">Count</button>
<p id="wordres"></p>
</div>

<div class="tool">
<h3>Uppercase Converter</h3>
<input id="upper">
<button onclick="upper()">Convert</button>
<p id="upperres"></p>
</div>

<div class="tool">
<h3>Lowercase Converter</h3>
<input id="lower">
<button onclick="lower()">Convert</button>
<p id="lowerres"></p>
</div>

<div class="tool">
<h3>Reverse Text</h3>
<input id="rev">
<button onclick="rev()">Reverse</button>
<p id="revres"></p>
</div>

<div class="tool">
<h3>Remove Spaces</h3>
<input id="space">
<button onclick="space()">Remove</button>
<p id="spaceres"></p>
</div>

<div class="tool">
<h3>Character Counter</h3>
<textarea id="char"></textarea>
<button onclick="charcount()">Count</button>
<p id="charres"></p>
</div>

<div class="tool">
<h3>Random Color</h3>
<button onclick="color()">Generate</button>
<p id="colorres"></p>
</div>

<div class="tool">
<h3>Current Time</h3>
<button onclick="time()">Show</button>
<p id="timeres"></p>
</div>

</div>

<script>

function pass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let p="";
for(let i=0;i<10;i++){
p+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("pass").innerText=p;
}

function rand(){
document.getElementById("rand").innerText=Math.floor(Math.random()*1000);
}

function words(){
let t=document.getElementById("word").value.trim();
let w=t ? t.split(/\s+/).length : 0;
document.getElementById("wordres").innerText="Words: "+w;
}

function upper(){
let t=document.getElementById("upper").value;
document.getElementById("upperres").innerText=t.toUpperCase();
}

function lower(){
let t=document.getElementById("lower").value;
document.getElementById("lowerres").innerText=t.toLowerCase();
}

function rev(){
let t=document.getElementById("rev").value;
document.getElementById("revres").innerText=t.split("").reverse().join("");
}

function space(){
let t=document.getElementById("space").value;
document.getElementById("spaceres").innerText=t.replace(/\s/g,'');
}

function charcount(){
let t=document.getElementById("char").value;
document.getElementById("charres").innerText="Characters: "+t.length;
}

function color(){
let c='#'+Math.floor(Math.random()*16777215).toString(16);
document.getElementById("colorres").innerText=c;
}

function time(){
document.getElementById("timeres").innerText=new Date().toLocaleTimeString();
}

</script>

</body>
</html>
