<!DOCTYPE html>
<html>
<head>
<title>Cyber Tools Hub</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ff9c;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
margin-top:40px;
font-size:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.tool{
background:#111;
border:1px solid #00ff9c;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:10px;
cursor:pointer;
}

input,textarea{
width:90%;
padding:10px;
margin:10px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>Cyber Tools Hub</h1>

<div class="grid">

<div class="tool">
<h3>Password Generator</h3>
<button onclick="pass()">Generate</button>
<p id="p"></p>
</div>

<div class="tool">
<h3>QR Code Generator</h3>
<input id="qrtext">
<button onclick="qr()">Generate</button>
<img id="qrimg">
</div>

<div class="tool">
<h3>Text Uppercase</h3>
<textarea id="t1"></textarea>
<button onclick="upper()">Convert</button>
<p id="r1"></p>
</div>

<div class="tool">
<h3>Word Counter</h3>
<textarea id="t2"></textarea>
<button onclick="count()">Count</button>
<p id="r2"></p>
</div>

<div class="tool">
<h3>Random Number</h3>
<button onclick="rand()">Generate</button>
<p id="r3"></p>
</div>

<div class="tool">
<h3>Reverse Text</h3>
<input id="rev">
<button onclick="reverse()">Reverse</button>
<p id="r4"></p>
</div>

<div class="tool">
<h3>Character Counter</h3>
<textarea id="char"></textarea>
<button onclick="charcount()">Count</button>
<p id="r5"></p>
</div>

<div class="tool">
<h3>Binary Converter</h3>
<input id="bin">
<button onclick="binary()">Convert</button>
<p id="r6"></p>
</div>

<div class="tool">
<h3>Color Generator</h3>
<button onclick="color()">Generate</button>
<p id="r7"></p>
</div>

<div class="tool">
<h3>Current Time</h3>
<button onclick="time()">Show</button>
<p id="r8"></p>
</div>

</div>

<script>

function pass(){
let c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%";
let p="";
for(let i=0;i<12;i++){
p+=c[Math.floor(Math.random()*c.length)];
}
document.getElementById("p").innerText=p;
}

function qr(){
let t=document.getElementById("qrtext").value;
document.getElementById("qrimg").src=
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+t;
}

function upper(){
let t=document.getElementById("t1").value;
document.getElementById("r1").innerText=t.toUpperCase();
}

function count(){
let t=document.getElementById("t2").value;
document.getElementById("r2").innerText=t.split(" ").length;
}

function rand(){
document.getElementById("r3").innerText=Math.floor(Math.random()*1000);
}

function reverse(){
let t=document.getElementById("rev").value;
document.getElementById("r4").innerText=t.split("").reverse().join("");
}

function charcount(){
let t=document.getElementById("char").value;
document.getElementById("r5").innerText=t.length;
}

function binary(){
let t=document.getElementById("bin").value;
document.getElementById("r6").innerText=
t.split("").map(x=>x.charCodeAt(0).toString(2)).join(" ");
}

function color(){
let c="#"+Math.floor(Math.random()*16777215).toString(16);
document.getElementById("r7").innerText=c;
document.body.style.background=c;
}

function time(){
document.getElementById("r8").innerText=new Date().toLocaleTimeString();
}

c.width=window.innerWidth;
