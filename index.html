<!DOCTYPE html>
<html>
<head>
<title>Cyber Tools</title>

<style>
body{
background:#000;
color:#00ff9c;
font-family:monospace;
text-align:center;
padding:40px;
}

.tool{
background:#111;
padding:20px;
margin:20px;
border:1px solid #00ff9c;
border-radius:10px;
}

button{
padding:10px;
margin:10px;
cursor:pointer;
}

input,textarea{
padding:10px;
width:80%;
}
</style>

</head>

<body>

<h1>Cyber Tools Hub</h1>

<div class="tool">
<h2>Password Generator</h2>
<button onclick="genPass()">Generate</button>
<p id="pass"></p>
</div>

<div class="tool">
<h2>Random Number</h2>
<button onclick="rand()">Generate</button>
<p id="num"></p>
</div>

<div class="tool">
<h2>Text Uppercase</h2>
<textarea id="text"></textarea>
<br>
<button onclick="upper()">Convert</button>
<p id="result"></p>
</div>

<script>

function genPass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let pass="";
for(let i=0;i<10;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("pass").innerText=pass;
}

function rand(){
document.getElementById("num").innerText=Math.floor(Math.random()*1000);
}

function upper(){
let t=document.getElementById("text").value;
document.getElementById("result").innerText=t.toUpperCase();
}

</script>

</body>
</html>
