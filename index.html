<!DOCTYPE html>
<html>
<head>
<title>Password Generator</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding-top:100px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Password Generator Tool</h1>

<p>Click button to generate strong password</p>

<button onclick="generate()">Generate Password</button>

<h2 id="result"></h2>

<script>

function generate(){

let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%";

let password="";

for(let i=0;i<12;i++){
password+=chars[Math.floor(Math.random()*chars.length)];
}

document.getElementById("result").innerText=password;

}

</script>

</body>
</html>
